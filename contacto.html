<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría Gratuita | TuAgencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased flex flex-col min-h-screen">

    <nav class="container mx-auto px-6 py-6">
        <a href="index.html" class="text-slate-500 font-medium hover:text-slate-900 flex items-center gap-2 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Volver
        </a>
    </nav>

    <main class="flex-grow container mx-auto px-6 py-8 max-w-xl">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold tracking-tight mb-4 text-slate-900">
                Detén la pérdida de tiempo.
            </h1>
            <p class="text-lg text-slate-600">
                Cuéntanos tu peor proceso manual. Construiremos un script demo funcional para tu negocio en 48 horas. Sin coste inicial.
            </p>
        </div>

        <form action="https://formspree.io/f/xojzpzyv" method="POST" class="bg-white p-8 md:p-10 rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100">
            
            <div class="mb-6">
                <label for="negocio" class="block text-sm font-bold text-slate-800 mb-2">Nombre del Negocio</label>
                <input type="text" id="negocio" name="Negocio" required placeholder="Ej: Clínica San José" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 text-slate-900">
            </div>

            <div class="mb-6">
                <label for="email" class="block text-sm font-bold text-slate-800 mb-2">Correo Electrónico Profesional</label>
                <input type="email" id="email" name="Email" required placeholder="tu@negocio.com" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 text-slate-900">
            </div>

            <div class="mb-8">
                <label for="problema" class="block text-sm font-bold text-slate-800 mb-2">¿Qué tarea manual odias repetir?</label>
                <textarea id="problema" name="Problema" rows="3" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none resize-none transition-all placeholder:text-slate-400 text-slate-900" placeholder="Ej: Pasar contactos del email al Excel..."></textarea>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold text-lg py-4 px-4 rounded-xl hover:bg-blue-700 hover:shadow-lg hover:shadow-blue-600/30 transition-all focus:ring-4 focus:ring-blue-100 flex justify-center items-center gap-2">
                Recibir mi Script de Prueba
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>

            <div class="mt-5 flex items-center justify-center gap-2 text-xs text-slate-500">
                <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                Tus datos son confidenciales. Cero Spam.
            </div>
        </form>
    </main>
</body>
</html>
