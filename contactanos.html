<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicita tu Auditoría | TuAgencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-900 font-sans antialiased">

    <nav class="container mx-auto px-6 py-6">
        <a href="index.html" class="text-slate-400 hover:text-slate-900 transition-colors font-medium text-sm flex items-center gap-2">
            ← Volver
        </a>
    </nav>

    <main class="container mx-auto px-6 py-12 max-w-xl text-center">
        <!-- H1 con enfoque agresivo -->
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-6">
            Déjanos tus datos y <span class="text-blue-600">analizaremos tu negocio.</span>
        </h1>
        
        <p class="text-lg text-slate-600 mb-12 leading-relaxed">
            No somos una consultora que pierde el tiempo. Rellena el formulario y, si vemos potencial de automatización, seremos nosotros quienes contactemos contigo para mostrarte el ahorro real.
        </p>

        <!-- FORMULARIO DE CUALIFICACIÓN -->
<form action="https://formspree.io/f/xojzpzyv" method="POST" class="bg-white p-8 md:p-10 rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 text-left">
    
    <input type="hidden" name="_next" value="https://tuweb.com/gracias.html" />

    <div class="mb-6">
        <label class="block text-sm font-bold text-slate-800 mb-2">Nombre de tu negocio</label>
        <input type="text" name="Negocio" required placeholder="Ej: Clínica Dental San José" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all">
    </div>

    <div class="mb-6">
        <label class="block text-sm font-bold text-slate-800 mb-2">Email corporativo</label>
        <input type="email" name="Email" required placeholder="nombre@tuempresa.com" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all">
    </div>

    <div class="mb-8">
        <label class="block text-sm font-bold text-slate-800 mb-2">¿Cuál es tu proceso más lento hoy?</label>
        <select name="Proceso" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all">
            <option>Gestión de citas y reservas</option>
            <option>Atención al cliente / Reseñas</option>
            <option>Facturación y gestión de leads</option>
            <option>Flujos de email y recordatorios</option>
            <option>Gestión de inventario y stock</option>
            <option>Procesos de onboarding de clientes</option>
            <option>Otro</option>
        </select>
    </div>

    <button type="submit" class="w-full bg-blue-600 text-white font-bold text-lg py-4 rounded-xl hover:bg-blue-700 hover:shadow-lg hover:shadow-blue-600/30 transition-all focus:ring-4 focus:ring-blue-100">
        Solicitar análisis de viabilidad
    </button>
    </form>
    </main>

</body>
</html>
