<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría Gratuita | TuAgencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased flex flex-col min-h-screen">

    <nav class="container mx-auto px-6 py-4">
        <a href="TuAgencia.html" class="text-blue-600 font-semibold hover:underline flex items-center gap-2">
            ← Volver a inicio
        </a>
    </nav>

    <main class="flex-grow container mx-auto px-6 py-12 max-w-2xl">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold tracking-tight mb-4 text-slate-900">
                Solicita tu Script de Prueba
            </h1>
            <p class="text-lg text-slate-600">
                Déjanos tus datos y qué proceso de tu negocio te hace perder más tiempo. Te enviaremos una demo funcional sin coste.
            </p>
        </div>

        <!-- FORMULARIO FORMSPREE -->
        <!-- SUSTITUYE EL ACTION POR TU URL DE FORMSPREE -->
        <form action="https://formspree.io/f/xojzpzyv" method="POST" class="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
            
            <div class="mb-6">
                <label for="negocio" class="block text-sm font-medium text-slate-700 mb-2">Nombre del Negocio (ej: Clínica Dental San José)</label>
                <input type="text" id="negocio" name="Negocio" required class="w-full px-4 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none">
            </div>

            <div class="mb-6">
                <label for="email" class="block text-sm font-medium text-slate-700 mb-2">Correo Electrónico</label>
                <input type="email" id="email" name="Email" required class="w-full px-4 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none">
            </div>

            <div class="mb-6">
                <label for="problema" class="block text-sm font-medium text-slate-700 mb-2">¿Qué tarea repetitiva odias hacer todas las semanas?</label>
                <textarea id="problema" name="Problema" rows="4" required class="w-full px-4 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none resize-none" placeholder="Ej: Copiar los datos de los pacientes del email a un Excel..."></textarea>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-md hover:bg-blue-700 transition">
                Enviar Solicitud
            </button>
        </form>
    </main>

    <footer class="text-center py-8 text-sm text-slate-400">
        <p>TuAgencia. Automatizando Alcalá de Henares.</p>
    </footer>

</body>
</html>
